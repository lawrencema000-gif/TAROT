# Codemagic CI/CD configuration for Arcana Tarot Life iOS builds.
#
# Triggering: MANUAL ONLY (no auto-trigger on push). Run via Codemagic
# dashboard → "Start new build" → ios-testflight. This avoids the
# Codemagic charge of running on every commit, and lets Lawrence test
# Web/Android changes in main first before promoting to iOS.
#
# Required in Codemagic dashboard before first build:
#   1. Environment variable group `arcana_ios_secrets` (already created)
#   2. Apple Developer integration named `Codemagic-admin` (existing,
#      already used by other apps in Lawrence's account)
#   3. The TAROT repo is added as an application
#
# First build will be slower (~20-30 min) because:
#   - `npx cap add ios` runs (creates ios/App/... via SPM)
#   - Xcode resolves Swift Package dependencies on first build
# Subsequent builds reuse cached SPM packages (~10-15 min).

workflows:
  ios-testflight:
    name: iOS TestFlight - Arcana Tarot Life
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      # Name must match the integration in Codemagic Settings → Integrations
      # → Developer Portal. Lawrence's existing integration is named
      # `Codemagic` (Key ID 75RBD8AXTP — same key that's named `Codemagic-admin`
      # in App Store Connect; the Codemagic-side label happens to drop the
      # `-admin` suffix).
      app_store_connect: Codemagic

    environment:
      groups:
        - arcana_ios_secrets
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.arcanatarotapp"
        # ATT prompt text shown when iOS displays the system tracking dialog.
        # Apple rejects vague boilerplate — keep this concrete and user-facing.
        # Editing this requires re-archiving (it's baked into Info.plist).
        ATT_USAGE_DESCRIPTION: "Arcana uses tracking to deliver more relevant tarot insights and personalized ad experiences. You can change this anytime in iOS Settings."
      # Capacitor CLI 8.x requires Node 22+. Locally Lawrence is on
      # v22.22.0 which matches; CI must use the same major.
      node: 22
      xcode: latest
      # Capacitor 8 defaults to SPM, but several plugins (notably
      # @codetrix-studio/capacitor-google-auth) lack Package.swift, so
      # SPM can't fully resolve the project. We force CocoaPods via the
      # `--packagemanager Cocoapods` flag passed to `npx cap add ios`,
      # which then generates ios/App/Podfile + App.xcworkspace as
      # expected by xcode-project build-ipa.
      cocoapods: default

    triggering:
      # Manual-only — uncomment one of the auto-trigger options below
      # if you want push-driven builds. Leaving auto-trigger disabled
      # is safer for now since Codemagic minutes are billable.
      cancel_previous_builds: true
      # events:
      #   - push
      # branch_patterns:
      #   - pattern: main
      #     include: true
      #     source: true

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Build web bundle (Vite)
        script: |
          # Vite picks up VITE_* env vars from the env group at build time.
          npm run build

      - name: Add iOS platform if missing
        script: |
          # Force CocoaPods (SPM mode breaks because not all plugins ship
          # Package.swift). --packagemanager flag is Capacitor 8's escape
          # hatch back to the proven CocoaPods path.
          if [ ! -d "ios/App" ]; then
            echo "::: First-time setup: generating ios/App via npx cap add ios --packagemanager Cocoapods"
            npx cap add ios --packagemanager Cocoapods
          else
            echo "::: Existing ios/App directory found, skipping cap add"
          fi

      - name: Sync Capacitor → iOS native project
        script: |
          npx cap sync ios

      - name: Generate iOS app icons from assets/icon.png
        script: |
          # @capacitor/assets reads assets/icon.png (1024x1024, sRGB, no
          # alpha) and writes the full set of iOS icon sizes — including
          # the 1024 marketing icon required for App Store listing —
          # into ios/App/App/Assets.xcassets/AppIcon.appiconset/.
          #
          # Without this step, `cap add ios` ships Capacitor's default
          # placeholder icons, causing the App Store listing icon to
          # appear grayed-out / blank on the ASC Apps overview.
          #
          # Idempotent: re-running overwrites the generated icons each
          # build, so the source of truth is always assets/icon.png.
          npx @capacitor/assets generate --ios --assetPath assets

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update

      - name: Inject Info.plist values (AdMob + ATT + Bundle ID + Google URL Scheme + Compliance)
        script: |
          PLIST="ios/App/App/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "::: ERROR: $PLIST not found — cap add ios may have failed"
            exit 1
          fi
          # AdMob app ID — Google Mobile Ads SDK 7.42+ crashes on launch
          # if this key is missing or empty.
          plutil -replace GADApplicationIdentifier -string "$VITE_ADMOB_APP_ID_IOS" "$PLIST"
          # App Tracking Transparency — required if using IDFA (AdMob personalized,
          # RevenueCat audiences, Sentry replay device fingerprinting). Without
          # this key Apple auto-rejects the app for using IDFA without disclosure.
          plutil -replace NSUserTrackingUsageDescription -string "$ATT_USAGE_DESCRIPTION" "$PLIST"
          # Bundle ID — overwrites whatever cap add ios generated, in case
          # the appId in capacitor.config.ts ever drifts from production.
          plutil -replace CFBundleIdentifier -string "$BUNDLE_ID" "$PLIST"
          # Export-compliance flag — TestFlight requires "Missing Compliance"
          # to be answered. Setting this to false (we use ONLY iOS-standard
          # HTTPS encryption, no proprietary crypto) auto-clears that prompt
          # for every future TestFlight build, no manual click required.
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST"

          # Google Sign-In iOS URL scheme. The plugin
          # @codetrix-studio/capacitor-google-auth uses Google's native
          # GIDSignIn SDK on iOS, which OPENS the user's Safari/in-app
          # browser via a custom URL scheme during the OAuth dance. The
          # scheme MUST be the iOS Client ID with its parts reversed
          # (com.googleusercontent.apps.<id>). Without this, GIDSignIn
          # crashes natively the moment signIn() is called, killing the
          # WebView with no JS-catchable exception.
          #
          # We inject via Python+plistlib because plutil's -insert syntax
          # for nested array+dict additions is quirky and easy to break;
          # plistlib treats Info.plist as a normal dict-of-arrays and
          # round-trips cleanly.
          # Reversed iOS Client ID — keep in sync with capacitor.config.ts's
          # `iosClientId`. This is the iOS-registered OAuth client (Bundle
          # ID com.arcanatarotapp), NOT the Web or Android client.
          GOOGLE_REVERSED_CLIENT_ID="com.googleusercontent.apps.804690093810-j8vf4jphqt036lus8niqr6qhmrk5rk5q"
          python3 - <<PYEOF
          import plistlib, sys
          plist_path = "$PLIST"
          scheme = "$GOOGLE_REVERSED_CLIENT_ID"
          with open(plist_path, "rb") as f:
              plist = plistlib.load(f)
          url_types = plist.setdefault("CFBundleURLTypes", [])
          # Idempotent: don't add the scheme twice if rerun.
          already = any(scheme in (entry.get("CFBundleURLSchemes") or []) for entry in url_types)
          if not already:
              url_types.append({
                  "CFBundleURLName": "com.arcanatarotapp.googleauth",
                  "CFBundleURLSchemes": [scheme],
              })
              with open(plist_path, "wb") as f:
                  plistlib.dump(plist, f)
              print("::: Added Google URL scheme to CFBundleURLTypes")
          else:
              print("::: Google URL scheme already present, skipping")
          PYEOF

          echo "::: Info.plist values set:"
          plutil -p "$PLIST" | grep -E "(GADApplicationIdentifier|NSUserTrackingUsageDescription|CFBundleIdentifier|ITSAppUsesNonExemptEncryption|CFBundleURLTypes)" || true

      - name: Configure iOS entitlements (Sign in with Apple)
        script: |
          # The @capacitor-community/apple-sign-in plugin needs the
          # `com.apple.developer.applesignin` entitlement to be embedded
          # in the IPA, otherwise ASAuthorizationAppleIDProvider returns
          # ASAuthorizationErrorUnknown (code 1000) at runtime — that's
          # exactly what we hit on Build 12.
          #
          # Capacitor 8's `cap add ios` template does NOT generate this
          # file by default, and Apple's signing flow needs:
          #   1. App.entitlements with the applesignin key
          #   2. project.pbxproj with CODE_SIGN_ENTITLEMENTS = App/App.entitlements
          #
          # We do both steps here so the build is self-healing — even if
          # `cap add ios` regenerates a fresh project, this script
          # restores the entitlement wiring.
          ENTITLEMENTS="ios/App/App/App.entitlements"
          cat > "$ENTITLEMENTS" <<'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
          </dict>
          </plist>
          PLIST_EOF
          echo "::: Created $ENTITLEMENTS"
          cat "$ENTITLEMENTS"

          # Wire the entitlements file into both Debug and Release configs
          # of the Xcode project. Use the xcodeproj Ruby gem (preinstalled
          # on Codemagic mac runners). If `cap add ios` already set this,
          # the assignment is idempotent.
          gem list xcodeproj -i >/dev/null 2>&1 || sudo gem install xcodeproj --no-document
          ruby - <<RUBYEOF
          require "xcodeproj"
          proj = Xcodeproj::Project.open("ios/App/App.xcodeproj")
          target = proj.targets.find { |t| t.name == "App" }
          raise "App target not found" unless target
          target.build_configurations.each do |config|
            config.build_settings["CODE_SIGN_ENTITLEMENTS"] = "App/App.entitlements"
            puts "::: #{config.name}: CODE_SIGN_ENTITLEMENTS = App/App.entitlements"
          end
          proj.save
          RUBYEOF

      - name: 1 - Initialize signing keychain
        script: |
          keychain initialize

      - name: 2 - Generate fresh RSA private key for cert
        script: |
          # Codemagic CLI requires an explicit --certificate-key argument
          # when creating a new iOS Distribution cert. Generate one fresh
          # in this build's ephemeral /tmp dir so we never reuse a key
          # that's stuck in Apple Dev Portal without local access.
          mkdir -p /tmp/signing
          openssl genrsa -out /tmp/signing/cert_key.pem 2048
          chmod 600 /tmp/signing/cert_key.pem
          echo "::: Private key created:"
          ls -la /tmp/signing/

      - name: 3 - Fetch (or create) certificate + provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/signing/cert_key.pem \
            --create
          echo "::: Certificates dirs:"
          ls -la /Users/builder/Library/Developer/Xcode/UserData/Certificates/ 2>&1 || echo "  (empty)"
          ls -la /Users/builder/Library/MobileDevice/Certificates/ 2>&1 || echo "  (empty)"
          echo "::: Profiles dir:"
          ls -la /Users/builder/Library/MobileDevice/Provisioning\ Profiles/ 2>&1 || echo "  (empty)"

      - name: 4 - Add certificates to keychain
        script: |
          keychain add-certificates

      - name: 5 - Configure Xcode to use profiles
        script: |
          xcode-project use-profiles

      - name: Set iOS build version + number
        script: |
          cd ios/App
          # Use Codemagic-provided BUILD_NUMBER (auto-incrementing per
          # Codemagic build) so consecutive uploads always get a fresh
          # build number even if the marketing version is unchanged.
          # We add 1000 to start cleanly above any test builds.
          NEW_BUILD=$(($BUILD_NUMBER + 1000))
          agvtool new-version -all "$NEW_BUILD"
          agvtool new-marketing-version "$VITE_APP_VERSION"

      - name: Archive + export ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # IMPORTANT: submit_to_testflight: true would trigger Apple's
        # *external* beta review queue, which requires "Test Information"
        # (Feedback Email + Beta App Review contact) to be filled in App
        # Store Connect first. For our purposes (internal testing only),
        # we just want the IPA uploaded and made available to internal
        # testers — which happens automatically WITHOUT this flag.
        #
        # Set submit_to_testflight: true ONLY when:
        #   1. Test Information is filled at
        #      https://appstoreconnect.apple.com/apps/6764630103/testflight/test-info
        #   2. We have external tester groups defined in beta_groups
        #
        # submit_to_testflight: true   # disabled — see comment above
        # beta_groups:
        #   - "Internal Testers"
        # NOTE: cancel_previous_submissions only applies when
        # submit_to_app_store is true. For TestFlight-only flow, omit it.

      email:
        # Send build status to Lawrence on success/failure.
        recipients:
          - lawrence.ma000@gmail.com
        notify:
          success: true
          failure: true
