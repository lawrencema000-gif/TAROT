[build]
  command = "npm run build"
  publish = "dist"

# Preview/branch-specific env: the `audit-smoke` preview deploy treats every
# feature flag as ON so QA testers see the full surface without waiting for
# gradual rollout. Production and other previews are unaffected.
[context.deploy-preview.environment]
  VITE_AUDIT_SMOKE = "true"

[context."audit-smoke".environment]
  VITE_AUDIT_SMOKE = "true"


[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store"

# index.html — must revalidate every load so new deploys reach returning
# users immediately. The hashed JS/CSS bundles below stay long-cached.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed bundles — safe to long-cache because filenames change on each build.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://www.google-analytics.com https://accounts.google.com https://ep1.adtrafficquality.google https://ep2.adtrafficquality.google https://tpc.googlesyndication.com https://www.googleadservices.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://*.googleapis.com https://*.googleusercontent.com https://*.google.com https://*.gstatic.com https://*.tile.openstreetmap.org https://www.googletagmanager.com https://pagead2.googlesyndication.com https://ep1.adtrafficquality.google https://ep2.adtrafficquality.google https://googleads.g.doubleclick.net https://www.googleadservices.com https://www.google.co.jp https://www.google.co.uk https://www.google.co.kr https://www.google.de https://www.google.fr https://www.google.ca; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.google-analytics.com https://*.analytics.google.com https://www.google.com https://*.googleapis.com https://*.googleusercontent.com https://www.googletagmanager.com https://accounts.google.com https://pagead2.googlesyndication.com https://ep1.adtrafficquality.google https://ep2.adtrafficquality.google https://generativelanguage.googleapis.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://*.sentry.io https://nominatim.openstreetmap.org https://googleads.g.doubleclick.net https://www.googleadservices.com https://stats.g.doubleclick.net; frame-src https://accounts.google.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com https://ep1.adtrafficquality.google https://ep2.adtrafficquality.google https://td.doubleclick.net"

# Let static files through (app-ads.txt, privacy-policy, etc.)
[[redirects]]
  from = "/ads.txt"
  to = "/ads.txt"
  status = 200

[[redirects]]
  from = "/app-ads.txt"
  to = "/app-ads.txt"
  status = 200

[[redirects]]
  from = "/privacy-policy.html"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/google-play-badge.png"
  to = "/google-play-badge.png"
  status = 200

[[redirects]]
  from = "/version.json"
  to = "/version.json"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

# SPA fallback — all routes serve index.html for react-router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
