# Minimal Supabase CLI config for the TAROT project.
# Only the email template + auth redirect sections are declared here so
# `supabase config push` updates ONLY those settings.

project_id = "ulzlthhkqjuohzjangcq"

[auth]
# Production web site. Was previously stuck on localhost, which broke the
# Google OAuth return flow (Supabase refused to redirect back to tarotlife.app).
site_url = "https://tarotlife.app"

# Every URL the app might ask Supabase to redirect to after an auth event
# (OAuth callback, email confirmation, password reset, magic link). Must
# include native-app deep links and every locale variant the SPA uses.
additional_redirect_urls = [
  "https://tarotlife.app",
  "https://tarotlife.app/",
  "https://tarotlife.app/**",
  "https://tarotlife.app/?lang=en",
  "https://tarotlife.app/?lang=ja",
  "https://tarotlife.app/?lang=ko",
  "https://tarotlife.app/?lang=zh",
  "com.arcana.app://auth",
  "com.arcana.app://**",
]

[auth.email.template.confirmation]
subject = "Confirm your Arcana email / メールアドレスを確認 / 이메일 확인 / 确认您的电子邮箱"
content_path = "./supabase/email-templates/confirm-signup.html"

[auth.email.template.recovery]
subject = "Reset your Arcana password / パスワードリセット / 비밀번호 재설정 / 重置密码"
content_path = "./supabase/email-templates/reset-password.html"

[auth.email.template.magic_link]
subject = "Your Arcana sign-in link / ログインリンク / 로그인 링크 / 登录链接"
content_path = "./supabase/email-templates/magic-link.html"

[auth.email.template.email_change]
subject = "Confirm your new Arcana email / 新しいメールアドレス確認 / 새 이메일 확인 / 确认新邮箱"
content_path = "./supabase/email-templates/change-email.html"

[auth.email.template.invite]
subject = "You're invited to Arcana / Arcanaへの招待 / Arcana 초대 / Arcana邀请"
content_path = "./supabase/email-templates/invite.html"

# Edge functions that must be reachable before a user signs in.
# The function bodies enforce their own rate limiting / validation.
[functions.ad-config]
verify_jwt = false

[functions.astrology-geocode]
verify_jwt = false

# Authenticated astrology endpoints: each function already calls
# supabase.auth.getUser(token) internally. The platform gateway's default
# verifier is HS256 only, but Supabase now issues ES256 user session tokens.
# Disabling platform verification lets the asymmetric tokens through; the
# function's internal getUser still enforces a real authenticated session.
[functions.astrology-daily]
verify_jwt = false

[functions.astrology-weekly]
verify_jwt = false

[functions.astrology-monthly]
verify_jwt = false

[functions.astrology-compute-natal]
verify_jwt = false

[functions.astrology-get-chart]
verify_jwt = false

[functions.astrology-transit-calendar]
verify_jwt = false

[functions.generate-reading]
verify_jwt = false

[functions.ad-events]
verify_jwt = false

[functions.create-checkout-session]
verify_jwt = false

[functions.create-portal-session]
verify_jwt = false

[functions.send-welcome-email]
verify_jwt = false
