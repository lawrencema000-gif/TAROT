# Codemagic CI/CD configuration for Arcana Tarot Life iOS builds.
#
# Triggering: MANUAL ONLY (no auto-trigger on push). Run via Codemagic
# dashboard → "Start new build" → ios-testflight. This avoids the
# Codemagic charge of running on every commit, and lets Lawrence test
# Web/Android changes in main first before promoting to iOS.
#
# Required in Codemagic dashboard before first build:
#   1. Environment variable group `arcana_ios_secrets` (already created)
#   2. Apple Developer integration named `Codemagic-admin` (existing,
#      already used by other apps in Lawrence's account)
#   3. The TAROT repo is added as an application
#
# First build will be slower (~20-30 min) because:
#   - `npx cap add ios` runs (creates ios/App/... via SPM)
#   - Xcode resolves Swift Package dependencies on first build
# Subsequent builds reuse cached SPM packages (~10-15 min).

workflows:
  ios-testflight:
    name: iOS TestFlight - Arcana Tarot Life
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      # Name must match the integration in Codemagic Settings → Integrations
      # → Developer Portal. Lawrence's existing integration is named
      # `Codemagic` (Key ID 75RBD8AXTP — same key that's named `Codemagic-admin`
      # in App Store Connect; the Codemagic-side label happens to drop the
      # `-admin` suffix).
      app_store_connect: Codemagic

    environment:
      groups:
        - arcana_ios_secrets
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.arcanatarotapp"
        # ATT prompt text shown when iOS displays the system tracking dialog.
        # Apple rejects vague boilerplate — keep this concrete and user-facing.
        # Editing this requires re-archiving (it's baked into Info.plist).
        ATT_USAGE_DESCRIPTION: "Arcana uses tracking to deliver more relevant tarot insights and personalized ad experiences. You can change this anytime in iOS Settings."
      # Capacitor CLI 8.x requires Node 22+. Locally Lawrence is on
      # v22.22.0 which matches; CI must use the same major.
      node: 22
      xcode: latest
      # Capacitor 8 defaults to SPM, but several plugins (notably
      # @codetrix-studio/capacitor-google-auth) lack Package.swift, so
      # SPM can't fully resolve the project. We force CocoaPods via the
      # `--packagemanager Cocoapods` flag passed to `npx cap add ios`,
      # which then generates ios/App/Podfile + App.xcworkspace as
      # expected by xcode-project build-ipa.
      cocoapods: default

    triggering:
      # Manual-only — uncomment one of the auto-trigger options below
      # if you want push-driven builds. Leaving auto-trigger disabled
      # is safer for now since Codemagic minutes are billable.
      cancel_previous_builds: true
      # events:
      #   - push
      # branch_patterns:
      #   - pattern: main
      #     include: true
      #     source: true

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Build web bundle (Vite)
        script: |
          # Vite picks up VITE_* env vars from the env group at build time.
          npm run build

      - name: Add iOS platform if missing
        script: |
          # Force CocoaPods (SPM mode breaks because not all plugins ship
          # Package.swift). --packagemanager flag is Capacitor 8's escape
          # hatch back to the proven CocoaPods path.
          if [ ! -d "ios/App" ]; then
            echo "::: First-time setup: generating ios/App via npx cap add ios --packagemanager Cocoapods"
            npx cap add ios --packagemanager Cocoapods
          else
            echo "::: Existing ios/App directory found, skipping cap add"
          fi

      - name: Sync Capacitor → iOS native project
        script: |
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update

      - name: Inject Info.plist values (AdMob + ATT + Bundle ID)
        script: |
          PLIST="ios/App/App/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "::: ERROR: $PLIST not found — cap add ios may have failed"
            exit 1
          fi
          # AdMob app ID — Google Mobile Ads SDK 7.42+ crashes on launch
          # if this key is missing or empty.
          plutil -replace GADApplicationIdentifier -string "$VITE_ADMOB_APP_ID_IOS" "$PLIST"
          # App Tracking Transparency — required if using IDFA (AdMob personalized,
          # RevenueCat audiences, Sentry replay device fingerprinting). Without
          # this key Apple auto-rejects the app for using IDFA without disclosure.
          plutil -replace NSUserTrackingUsageDescription -string "$ATT_USAGE_DESCRIPTION" "$PLIST"
          # Bundle ID — overwrites whatever cap add ios generated, in case
          # the appId in capacitor.config.ts ever drifts from production.
          plutil -replace CFBundleIdentifier -string "$BUNDLE_ID" "$PLIST"
          echo "::: Info.plist values set:"
          plutil -p "$PLIST" | grep -E "(GADApplicationIdentifier|NSUserTrackingUsageDescription|CFBundleIdentifier)"

      - name: 1 - Initialize signing keychain
        script: |
          keychain initialize

      - name: 2 - Create iOS Distribution certificate (if missing)
        script: |
          # Force-create a fresh iOS Distribution certificate WITH a local
          # private key. fetch-signing-files alone can fail if Apple Dev
          # Portal already has a Distribution cert whose private key isn't
          # accessible in this CI runner ("Cannot save Signing Certificates
          # without certificate private key" error).
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save \
            || echo "::: Certificate creation skipped (may already exist locally)"
          ls -la /Users/builder/Library/Developer/Xcode/UserData/Certificates/ 2>&1 || true
          ls -la /Users/builder/Library/MobileDevice/Certificates/ 2>&1 || true

      - name: 3 - Fetch (or create) provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          ls -la /Users/builder/Library/MobileDevice/Provisioning\ Profiles/ 2>&1 || true

      - name: 4 - Add certificates to keychain
        script: |
          keychain add-certificates

      - name: 5 - Configure Xcode to use profiles
        script: |
          xcode-project use-profiles

      - name: Set iOS build version + number
        script: |
          cd ios/App
          # Use Codemagic-provided BUILD_NUMBER (auto-incrementing per
          # Codemagic build) so consecutive uploads always get a fresh
          # build number even if the marketing version is unchanged.
          # We add 1000 to start cleanly above any test builds.
          NEW_BUILD=$(($BUILD_NUMBER + 1000))
          agvtool new-version -all "$NEW_BUILD"
          agvtool new-marketing-version "$VITE_APP_VERSION"

      - name: Archive + export ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Upload to TestFlight, mark as available for internal testing.
        # Beta groups need to be created in App Store Connect → TestFlight
        # → Internal Testing first; uncomment + name them here once they exist.
        submit_to_testflight: true
        # beta_groups:
        #   - "Internal Testers"
        # NOTE: cancel_previous_submissions only applies when
        # submit_to_app_store is true. For TestFlight-only flow, omit it.

      email:
        # Send build status to Lawrence on success/failure.
        recipients:
          - lawrence.ma000@gmail.com
        notify:
          success: true
          failure: true
