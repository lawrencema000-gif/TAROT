<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1419;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="200" height="300" fill="url(#cardGrad)" rx="8"/>

  <rect x="5" y="5" width="190" height="290" fill="none" stroke="url(#goldGrad)" stroke-width="2" rx="6" opacity="0.3"/>

  <rect x="10" y="10" width="180" height="280" fill="none" stroke="url(#goldGrad)" stroke-width="1" rx="4" opacity="0.2"/>

  <g transform="translate(100, 150)">
    <circle r="40" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>
    <circle r="50" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2"/>

    <path d="M0,-25 L5,-10 L20,-10 L8,2 L13,17 L0,7 L-13,17 L-8,2 L-20,-10 L-5,-10 Z"
          fill="url(#goldGrad)" opacity="0.5">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="60s"
        repeatCount="indefinite"/>
    </path>

    <path d="M0,25 L5,40 L20,40 L8,52 L13,67 L0,57 L-13,67 L-8,52 L-20,40 L-5,40 Z"
          fill="url(#goldGrad)" opacity="0.3">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="360"
        to="0"
        dur="60s"
        repeatCount="indefinite"/>
    </path>
  </g>

  <text x="100" y="280" font-family="serif" font-size="12" fill="url(#goldGrad)" text-anchor="middle" opacity="0.4">
    ARCANA
  </text>
</svg>
