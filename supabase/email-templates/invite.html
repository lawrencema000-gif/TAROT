<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
</head>
<body style="margin:0;padding:0;background:#0a0a0f;font-family:'Inter','Noto Sans JP','Noto Sans KR','Noto Sans SC',system-ui,sans-serif;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" width="100%" style="max-width:560px;background:#12121a;margin:32px auto;border-radius:16px;overflow:hidden;">
    <tr>
      <td style="padding:32px 32px 16px;text-align:center;">
        <div style="font-family:'Cormorant Garamond','Noto Serif JP','Noto Serif KR','Noto Serif SC',Georgia,serif;font-size:28px;color:#d4af37;letter-spacing:0.05em;">☽ Arcana</div>
      </td>
    </tr>

    <tr>
      <td style="padding:0 32px 24px;color:#e8e4f0;">
        <h1 style="font-family:'Cormorant Garamond','Noto Serif JP','Noto Serif KR','Noto Serif SC',Georgia,serif;font-size:22px;font-weight:600;margin:0 0 8px;color:#f3efff;">You're invited to Arcana</h1>
        <p style="margin:0 0 4px;font-size:15px;line-height:1.6;color:#c9c2dc;">Accept the invitation to begin your daily ritual:</p>
        <h1 style="font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600;margin:20px 0 8px;color:#f3efff;">Arcanaへの招待</h1>
        <p style="margin:0 0 4px;font-size:15px;line-height:1.6;color:#c9c2dc;">招待を承認して日々のリチュアルを始めましょう:</p>
        <h1 style="font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;margin:20px 0 8px;color:#f3efff;">Arcana에 초대되셨습니다</h1>
        <p style="margin:0 0 4px;font-size:15px;line-height:1.6;color:#c9c2dc;">초대를 수락하고 일일 의식을 시작하세요:</p>
        <h1 style="font-family:'Noto Serif SC',serif;font-size:20px;font-weight:600;margin:20px 0 8px;color:#f3efff;">邀请您使用 Arcana</h1>
        <p style="margin:0 0 4px;font-size:15px;line-height:1.6;color:#c9c2dc;">接受邀请以开始您的每日仪式:</p>
      </td>
    </tr>

    <tr>
      <td style="padding:8px 32px 32px;text-align:center;">
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#d4af37,#b8902a);color:#0a0a0f;font-weight:600;text-decoration:none;border-radius:999px;font-size:15px;">
          Accept / 承認 / 수락 / 接受
        </a>
      </td>
    </tr>
  </table>
</body>
</html>
